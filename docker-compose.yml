services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openclaims-postgres
    ports:
      - "5432:5432"  # Expose for local development/DBeaver
    environment:
      POSTGRES_DB: openclaims
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openclaims-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Queue Broker
  redis:
    image: redis:7-alpine
    container_name: openclaims-redis
    networks:
      - openclaims-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15
    container_name: openclaims-neo4j
    ports:
      - "7474:7474"  # HTTP Browser Interface
      - "7687:7687"  # Bolt Protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
    networks:
      - openclaims-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaims-backend
    ports:
      - "3000:3000"  # Expose backend for direct access to Swagger
    environment:
      # Database URLs
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/openclaims
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      
      # AWS Configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      
      # App settings
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - openclaims-network
    # Internal port only - not exposed externally

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaims-worker
    command: celery -A celery_worker.celery_app worker --loglevel=info
    environment:
      # Database URLs
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/openclaims
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      
      # AWS Configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - openclaims-network

  # Frontend (Next.js with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openclaims-frontend
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      # Preserve node_modules in container
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    networks:
      - openclaims-network
    # Internal port only - not exposed externally

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: openclaims-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - openclaims-network

networks:
  openclaims-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
